openapi: 3.0.3
info:
  title: sequenced-queue API
  version: 0.1.0
paths:
  /queues/{queueName}/items:
    post:
      summary: Enqueue an item
      security:
        - WorkerApiKey: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnqueueRequest"
            examples:
              command:
                value:
                  sourceId: "customer-123"
                  itemType: "example.command"
                  idempotencyKey: "sync-customer-123-001"
                  payload:
                    action: "sync"
                  headers:
                    traceId: "trace-001"
                  maxAttempts: 5
      responses:
        "200":
          description: Enqueued or existing idempotent item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnqueueResponse"
              examples:
                enqueued:
                  value:
                    itemId: "00000000-0000-0000-0000-000000000001"
                    queueName: "wf.commands"
                    sourceId: "customer-123"
                    sequenceNo: 1
                    status: "pending"
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /queues/{queueName}/claims:
    post:
      summary: Claim the head item for one available source
      security:
        - WorkerApiKey: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimRequest"
            examples:
              worker:
                value:
                  workerId: "worker-1"
                  supportedItemTypes: ["example.command"]
                  leaseSeconds: 60
                  maxItems: 1
      responses:
        "200":
          description: Claim result, empty when no item is available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimResponse"
              examples:
                claimed:
                  value:
                    leaseId: "11111111-1111-1111-1111-111111111111"
                    queueName: "wf.commands"
                    sourceId: "customer-123"
                    leaseUntil: "2026-06-13T10:01:00Z"
                    items:
                      - itemId: "00000000-0000-0000-0000-000000000001"
                        sequenceNo: 1
                        itemType: "example.command"
                        payload:
                          action: "sync"
                        headers:
                          traceId: "trace-001"
                empty:
                  value:
                    leaseId: null
                    queueName: null
                    sourceId: null
                    leaseUntil: null
                    items: []
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /queues/{queueName}/items/{itemId}/complete:
    post:
      summary: Complete a leased item
      security:
        - WorkerApiKey: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteRequest"
            examples:
              success:
                value:
                  workerId: "worker-1"
                  leaseId: "11111111-1111-1111-1111-111111111111"
                  result:
                    handledBy: "worker-1"
      responses:
        "200":
          description: Completed item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
              examples:
                completed:
                  value:
                    itemId: "00000000-0000-0000-0000-000000000001"
                    queueName: "wf.commands"
                    sourceId: "customer-123"
                    sequenceNo: 1
                    itemType: "example.command"
                    status: "succeeded"
                    result:
                      handledBy: "worker-1"
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /queues/{queueName}/items/{itemId}/fail:
    post:
      summary: Fail a leased item
      security:
        - WorkerApiKey: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FailRequest"
            examples:
              retryable:
                value:
                  workerId: "worker-1"
                  leaseId: "11111111-1111-1111-1111-111111111111"
                  retryable: true
                  errorType: "TEMPORARY_ERROR"
                  errorMessage: "remote service unavailable"
                  backoffSeconds: 30
              nonRetryable:
                value:
                  workerId: "worker-1"
                  leaseId: "11111111-1111-1111-1111-111111111111"
                  retryable: false
                  errorType: "VALIDATION_ERROR"
                  errorMessage: "payload is invalid"
      responses:
        "200":
          description: Failed, retry scheduled, or dead-lettered item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
              examples:
                retryWait:
                  value:
                    itemId: "00000000-0000-0000-0000-000000000001"
                    queueName: "wf.commands"
                    sourceId: "customer-123"
                    sequenceNo: 1
                    itemType: "example.command"
                    status: "retry_wait"
                    lastErrorType: "TEMPORARY_ERROR"
                    lastErrorMessage: "remote service unavailable"
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /queues/{queueName}/leases/{leaseId}/heartbeat:
    post:
      summary: Extend a worker lease
      security:
        - WorkerApiKey: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - name: leaseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
            examples:
              extend:
                value:
                  workerId: "worker-1"
                  extendBySeconds: 60
      responses:
        "204":
          description: Lease extended
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /queues/{queueName}/sources/{sourceId}/items:
    get:
      summary: List source items in sequence order
      security:
        - WorkerApiKey: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Source items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemResponse"
              examples:
                sourceItems:
                  value:
                    - itemId: "00000000-0000-0000-0000-000000000001"
                      queueName: "wf.commands"
                      sourceId: "customer-123"
                      sequenceNo: 1
                      itemType: "example.command"
                      status: "succeeded"
                    - itemId: "00000000-0000-0000-0000-000000000002"
                      queueName: "wf.commands"
                      sourceId: "customer-123"
                      sequenceNo: 2
                      itemType: "example.command"
                      status: "pending"
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /queues/{queueName}/items/{itemId}:
    get:
      summary: Get one item
      security:
        - WorkerApiKey: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          description: Item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
              examples:
                item:
                  value:
                    itemId: "00000000-0000-0000-0000-000000000001"
                    queueName: "wf.commands"
                    sourceId: "customer-123"
                    sequenceNo: 1
                    itemType: "example.command"
                    status: "pending"
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/queues/{queueName}/dead-lettered:
    get:
      summary: List dead-lettered items
      security:
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Dead-lettered items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemResponse"
              examples:
                deadLettered:
                  value:
                    - itemId: "00000000-0000-0000-0000-000000000003"
                      queueName: "wf.commands"
                      sourceId: "customer-123"
                      sequenceNo: 3
                      itemType: "example.command"
                      status: "dead_lettered"
                      attemptCount: 5
                      maxAttempts: 5
                      lastErrorType: "TEMPORARY_ERROR"
                      lastErrorMessage: "remote service unavailable"
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/queues/{queueName}/blocked-sources:
    get:
      summary: List blocked sources
      security:
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Blocked sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockedSourceResponse"
              examples:
                blockedSources:
                  value:
                    - queueName: "wf.commands"
                      sourceId: "customer-123"
                      status: "blocked"
                      leasedBy: null
                      leaseUntil: null
                      headItemId: "00000000-0000-0000-0000-000000000003"
                      headItemStatus: "dead_lettered"
                      updatedAt: "2026-06-13T10:00:00Z"
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/queues/{queueName}/sources/{sourceId}/items:
    get:
      summary: List source items in sequence order for admin inspection
      security:
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Source items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItemResponse"
              examples:
                adminSourceItems:
                  value:
                    - itemId: "00000000-0000-0000-0000-000000000001"
                      queueName: "wf.commands"
                      sourceId: "customer-123"
                      sequenceNo: 1
                      itemType: "example.command"
                      status: "succeeded"
                    - itemId: "00000000-0000-0000-0000-000000000003"
                      queueName: "wf.commands"
                      sourceId: "customer-123"
                      sequenceNo: 3
                      itemType: "example.command"
                      status: "dead_lettered"
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/queues/{queueName}/items/{itemId}:
    get:
      summary: Get one item for admin inspection
      security:
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          description: Item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
              examples:
                adminItem:
                  value:
                    itemId: "00000000-0000-0000-0000-000000000003"
                    queueName: "wf.commands"
                    sourceId: "customer-123"
                    sequenceNo: 3
                    itemType: "example.command"
                    status: "dead_lettered"
                    attemptCount: 5
                    maxAttempts: 5
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/queues/{queueName}/audit:
    get:
      summary: List admin audit rows
      security:
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Admin audit rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAuditResponse"
              examples:
                auditRows:
                  value:
                    - auditId: "22222222-2222-2222-2222-222222222222"
                      occurredAt: "2026-06-13T10:05:00Z"
                      actorId: "admin-api-key"
                      operation: "skip"
                      queueName: "wf.commands"
                      sourceId: "customer-123"
                      itemId: "00000000-0000-0000-0000-000000000003"
                      previousStatus: "dead_lettered"
                      newStatus: "skipped"
                      reason: "operator repair"
                      metadata: {}
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/queues/{queueName}/items/{itemId}/retry:
    post:
      summary: Retry a dead-lettered head item
      security:
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminActionRequest"
            examples:
              retryReason:
                value:
                  reason: "temporary dependency recovered"
      responses:
        "200":
          description: Retried item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
              examples:
                retried:
                  value:
                    itemId: "00000000-0000-0000-0000-000000000003"
                    queueName: "wf.commands"
                    sourceId: "customer-123"
                    sequenceNo: 3
                    itemType: "example.command"
                    status: "retry_wait"
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/queues/{queueName}/items/{itemId}/skip:
    post:
      summary: Skip an item to unblock its source
      security:
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminActionRequest"
            examples:
              skipReason:
                value:
                  reason: "bad command superseded"
      responses:
        "200":
          description: Skipped item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
              examples:
                skipped:
                  value:
                    itemId: "00000000-0000-0000-0000-000000000003"
                    queueName: "wf.commands"
                    sourceId: "customer-123"
                    sequenceNo: 3
                    itemType: "example.command"
                    status: "skipped"
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/queues/{queueName}/items/{itemId}/cancel:
    post:
      summary: Cancel an item
      security:
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminActionRequest"
            examples:
              cancelReason:
                value:
                  reason: "source was deleted"
      responses:
        "200":
          description: Cancelled item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
              examples:
                cancelled:
                  value:
                    itemId: "00000000-0000-0000-0000-000000000004"
                    queueName: "wf.commands"
                    sourceId: "customer-456"
                    sequenceNo: 1
                    itemType: "example.command"
                    status: "cancelled"
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/queues/{queueName}/sources/{sourceId}/unblock:
    post:
      summary: Unblock a source after the blocking head item has been repaired
      security:
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/QueueName"
        - name: sourceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminActionRequest"
            examples:
              unblockReason:
                value:
                  reason: "blocking head was repaired"
      responses:
        "200":
          description: Unblocked source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
              examples:
                unblocked:
                  value:
                    queueName: "wf.commands"
                    sourceId: "customer-123"
                    nextSequenceNo: 4
                    status: "idle"
                    leasedBy: null
                    leaseId: null
                    leaseUntil: null
                    updatedAt: "2026-06-13T10:06:00Z"
        default:
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    WorkerApiKey:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: Worker API key for queue operations.
    AdminApiKey:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: Admin API key for queue and admin operations.
  responses:
    Error:
      description: Structured error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            leaseLost:
              value:
                errorCode: "LEASE_LOST"
                message: "lease is not held by worker"
                queueName: "wf.commands"
                sourceId: "customer-123"
                itemId: "00000000-0000-0000-0000-000000000001"
                details: {}
    Unauthorized:
      description: Missing bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missingBearerToken:
              value:
                errorCode: "UNAUTHORIZED"
                message: "missing bearer token"
                details: {}
    Forbidden:
      description: Invalid or insufficient API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidApiKey:
              value:
                errorCode: "FORBIDDEN"
                message: "invalid api key"
                details: {}
            adminApiKeyRequired:
              value:
                errorCode: "FORBIDDEN"
                message: "admin api key required"
                details: {}
  parameters:
    QueueName:
      name: queueName
      in: path
      required: true
      schema:
        type: string
    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 100
        minimum: 1
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
  schemas:
    EnqueueRequest:
      type: object
      required: [sourceId, itemType]
      properties:
        sourceId: { type: string }
        itemType: { type: string }
        idempotencyKey: { type: string, nullable: true }
        payload: { type: object, additionalProperties: true }
        headers: { type: object, additionalProperties: true }
        availableAt: { type: string, format: date-time, nullable: true }
        maxAttempts: { type: integer, nullable: true }
    EnqueueResponse:
      type: object
      properties:
        itemId: { type: string, format: uuid }
        queueName: { type: string }
        sourceId: { type: string }
        sequenceNo: { type: integer, format: int64 }
        status:
          $ref: "#/components/schemas/ItemStatus"
    ClaimRequest:
      type: object
      required: [workerId, supportedItemTypes]
      properties:
        workerId: { type: string }
        supportedItemTypes:
          type: array
          items: { type: string }
        leaseSeconds: { type: integer, default: 60 }
        maxItems: { type: integer, default: 1 }
    ClaimResponse:
      type: object
      properties:
        leaseId: { type: string, format: uuid, nullable: true }
        queueName: { type: string, nullable: true }
        sourceId: { type: string, nullable: true }
        leaseUntil: { type: string, format: date-time, nullable: true }
        items:
          type: array
          items:
            $ref: "#/components/schemas/ClaimItem"
    ClaimItem:
      type: object
      properties:
        itemId: { type: string, format: uuid }
        sequenceNo: { type: integer, format: int64 }
        itemType: { type: string }
        payload: { type: object, additionalProperties: true }
        headers: { type: object, additionalProperties: true }
    CompleteRequest:
      type: object
      required: [workerId, leaseId]
      properties:
        workerId: { type: string }
        leaseId: { type: string, format: uuid }
        result: { type: object, additionalProperties: true }
    FailRequest:
      type: object
      required: [workerId, leaseId, retryable]
      properties:
        workerId: { type: string }
        leaseId: { type: string, format: uuid }
        retryable: { type: boolean }
        errorType: { type: string }
        errorMessage: { type: string }
        backoffSeconds: { type: integer, nullable: true }
    HeartbeatRequest:
      type: object
      required: [workerId]
      properties:
        workerId: { type: string }
        extendBySeconds: { type: integer, default: 60 }
    ItemResponse:
      type: object
      required:
        - itemId
        - queueName
        - sourceId
        - sequenceNo
        - itemType
        - payload
        - headers
        - status
        - availableAt
        - attemptCount
        - maxAttempts
        - createdAt
        - updatedAt
      properties:
        itemId: { type: string, format: uuid }
        queueName: { type: string }
        sourceId: { type: string }
        sequenceNo: { type: integer, format: int64 }
        itemType: { type: string }
        payload: { type: object, additionalProperties: true }
        headers: { type: object, additionalProperties: true }
        status:
          $ref: "#/components/schemas/ItemStatus"
        availableAt: { type: string, format: date-time }
        claimedBy: { type: string, nullable: true }
        leaseId: { type: string, format: uuid, nullable: true }
        leaseUntil: { type: string, format: date-time, nullable: true }
        attemptCount: { type: integer }
        maxAttempts: { type: integer }
        idempotencyKey: { type: string, nullable: true }
        lastErrorType: { type: string, nullable: true }
        lastErrorMessage: { type: string, nullable: true }
        result: { type: object, additionalProperties: true, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SourceResponse:
      type: object
      required:
        - queueName
        - sourceId
        - nextSequenceNo
        - status
        - updatedAt
      properties:
        queueName: { type: string }
        sourceId: { type: string }
        nextSequenceNo: { type: integer, format: int64 }
        status:
          $ref: "#/components/schemas/SourceStatus"
        leasedBy: { type: string, nullable: true }
        leaseId: { type: string, format: uuid, nullable: true }
        leaseUntil: { type: string, format: date-time, nullable: true }
        updatedAt: { type: string, format: date-time }
    ItemStatus:
      type: string
      description: >
        Item lifecycle status. succeeded, cancelled, skipped, and failed are
        passable terminal states. failed is a terminal non-retryable failure.
        dead_lettered is a terminal blocking failure that blocks the source
        until admin repair.
      enum:
        - pending
        - processing
        - succeeded
        - retry_wait
        - failed
        - dead_lettered
        - cancelled
        - skipped
    SourceStatus:
      type: string
      enum:
        - idle
        - leased
        - blocked
    BlockedSourceResponse:
      type: object
      properties:
        queueName: { type: string }
        sourceId: { type: string }
        status:
          $ref: "#/components/schemas/SourceStatus"
        leasedBy: { type: string, nullable: true }
        leaseUntil: { type: string, format: date-time, nullable: true }
        headItemId: { type: string, format: uuid, nullable: true }
        headItemStatus:
          allOf:
            - $ref: "#/components/schemas/ItemStatus"
          nullable: true
        updatedAt: { type: string, format: date-time }
    AdminAuditResponse:
      type: object
      properties:
        auditId: { type: string, format: uuid }
        occurredAt: { type: string, format: date-time }
        actorId: { type: string, nullable: true }
        operation: { type: string }
        queueName: { type: string }
        sourceId: { type: string, nullable: true }
        itemId: { type: string, format: uuid, nullable: true }
        previousStatus:
          allOf:
            - $ref: "#/components/schemas/ItemStatus"
          nullable: true
        newStatus:
          allOf:
            - $ref: "#/components/schemas/ItemStatus"
          nullable: true
        reason: { type: string, nullable: true }
        metadata: { type: object, additionalProperties: true }
    AdminActionRequest:
      type: object
      properties:
        reason: { type: string, nullable: true }
    ErrorResponse:
      type: object
      required: [errorCode, message, details]
      properties:
        errorCode:
          type: string
          enum:
            - VALIDATION_ERROR
            - ITEM_NOT_FOUND
            - SOURCE_NOT_FOUND
            - SOURCE_BLOCKED
            - LEASE_LOST
            - LEASE_EXPIRED
            - ITEM_NOT_PROCESSING
            - IDEMPOTENCY_CONFLICT
            - UNAUTHORIZED
            - FORBIDDEN
            - QUEUE_CONFLICT
            - INTERNAL_ERROR
        message: { type: string }
        queueName: { type: string, nullable: true }
        sourceId: { type: string, nullable: true }
        itemId: { type: string, format: uuid, nullable: true }
        details: { type: object, additionalProperties: true }
