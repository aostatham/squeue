services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sequenced_queue
      POSTGRES_USER: sequenced_queue
      POSTGRES_PASSWORD: sequenced_queue
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sequenced_queue"]
      interval: 5s
      timeout: 5s
      retries: 10
